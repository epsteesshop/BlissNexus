<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Central nexus point -->
  <circle cx="50" cy="50" r="8" fill="url(#grad)"/>
  <!-- Converging agents (dots with paths) -->
  <circle cx="20" cy="20" r="5" fill="#6366f1" opacity="0.8"/>
  <circle cx="80" cy="20" r="5" fill="#7c3aed" opacity="0.8"/>
  <circle cx="15" cy="70" r="5" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="85" cy="75" r="5" fill="#6366f1" opacity="0.8"/>
  <circle cx="50" cy="10" r="4" fill="#a78bfa" opacity="0.7"/>
  <!-- Connection lines -->
  <line x1="20" y1="20" x2="45" y2="45" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="20" x2="55" y2="45" stroke="#7c3aed" stroke-width="2" opacity="0.5"/>
  <line x1="15" y1="70" x2="45" y2="55" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
  <line x1="85" y1="75" x2="55" y2="55" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="10" x2="50" y2="42" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
</svg>
