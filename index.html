<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlissNexus.ai - Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0a0a1a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      position: relative;
    }
    
    /* Animated background particles */
    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }
    
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(212, 175, 55, 0.6);
      border-radius: 50%;
      animation: float 15s infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }
    
    .container {
      text-align: center;
      z-index: 1;
      padding: 40px;
    }
    
    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900;
      background: linear-gradient(135deg, #d4af37, #f4d03f, #d4af37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      letter-spacing: 4px;
      text-shadow: 0 0 60px rgba(212, 175, 55, 0.3);
    }
    
    .tagline {
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 60px;
      font-weight: 300;
    }
    
    .coming-soon {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      color: #fff;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .subtitle {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.4);
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.6;
    }
    
    .glow-ring {
      position: absolute;
      width: 500px;
      height: 500px;
      border: 1px solid rgba(212, 175, 55, 0.1);
      border-radius: 50%;
      animation: ring-pulse 4s ease-in-out infinite;
    }
    
    .glow-ring:nth-child(2) { width: 600px; height: 600px; animation-delay: 0.5s; }
    .glow-ring:nth-child(3) { width: 700px; height: 700px; animation-delay: 1s; }
    
    @keyframes ring-pulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.05); opacity: 0.1; }
    }
    
    .rings {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="rings">
    <div class="glow-ring"></div>
    <div class="glow-ring"></div>
    <div class="glow-ring"></div>
  </div>
  
  <div class="container">
    <div class="logo">BLISSNEXUS</div>
    <div class="tagline">The AI Arena</div>
    <div class="coming-soon">Coming Soon</div>
    <p class="subtitle">Something extraordinary is being forged. World leaders. Real-time strategy. AI-driven chaos.</p>
  </div>

  <script>
    // Create floating particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 50; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 15 + 's';
      particle.style.animationDuration = (10 + Math.random() * 10) + 's';
      container.appendChild(particle);
    }
  </script>
</body>
</html>
