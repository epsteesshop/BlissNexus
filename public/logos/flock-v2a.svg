<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Lead bird - largest, center-front -->
  <g transform="translate(35,40)">
    <polygon points="15,0 30,12 15,18 0,12" fill="#6366f1"/>
    <polygon points="30,12 38,8 34,15" fill="#4f46e5"/>
    <polygon points="0,12 -8,8 -4,15" fill="#8b5cf6"/>
  </g>
  
  <!-- Second row - 2 birds -->
  <g transform="translate(18,28)">
    <polygon points="12,0 24,10 12,14 0,10" fill="#7c3aed"/>
    <polygon points="24,10 30,7 27,12" fill="#6366f1"/>
    <polygon points="0,10 -6,7 -3,12" fill="#8b5cf6"/>
  </g>
  <g transform="translate(55,25)">
    <polygon points="12,0 24,10 12,14 0,10" fill="#8b5cf6"/>
    <polygon points="24,10 30,7 27,12" fill="#7c3aed"/>
    <polygon points="0,10 -6,7 -3,12" fill="#6366f1"/>
  </g>
  
  <!-- Third row - 3 birds -->
  <g transform="translate(8,15)">
    <polygon points="9,0 18,8 9,11 0,8" fill="#6366f1" opacity="0.9"/>
    <polygon points="18,8 23,5 20,9" fill="#7c3aed"/>
    <polygon points="0,8 -5,5 -2,9" fill="#8b5cf6"/>
  </g>
  <g transform="translate(42,12)">
    <polygon points="9,0 18,8 9,11 0,8" fill="#8b5cf6" opacity="0.9"/>
    <polygon points="18,8 23,5 20,9" fill="#6366f1"/>
    <polygon points="0,8 -5,5 -2,9" fill="#7c3aed"/>
  </g>
  <g transform="translate(72,18)">
    <polygon points="9,0 18,8 9,11 0,8" fill="#7c3aed" opacity="0.9"/>
    <polygon points="18,8 23,5 20,9" fill="#8b5cf6"/>
    <polygon points="0,8 -5,5 -2,9" fill="#6366f1"/>
  </g>
  
  <!-- Back row - smaller, fading -->
  <g transform="translate(25,5)" opacity="0.7">
    <polygon points="7,0 14,6 7,8 0,6" fill="#a78bfa"/>
    <polygon points="14,6 18,4 16,7" fill="#8b5cf6"/>
  </g>
  <g transform="translate(58,3)" opacity="0.7">
    <polygon points="7,0 14,6 7,8 0,6" fill="#a78bfa"/>
    <polygon points="14,6 18,4 16,7" fill="#8b5cf6"/>
  </g>
  
  <!-- Trail birds - smallest -->
  <g transform="translate(48,60)" opacity="0.85">
    <polygon points="10,0 20,8 10,12 0,8" fill="#7c3aed"/>
    <polygon points="20,8 26,5 23,10" fill="#6366f1"/>
    <polygon points="0,8 -6,5 -3,10" fill="#8b5cf6"/>
  </g>
  <g transform="translate(28,68)" opacity="0.7">
    <polygon points="8,0 16,6 8,9 0,6" fill="#8b5cf6"/>
  </g>
  <g transform="translate(62,72)" opacity="0.7">
    <polygon points="8,0 16,6 8,9 0,6" fill="#6366f1"/>
  </g>
