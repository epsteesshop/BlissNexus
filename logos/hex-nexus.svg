<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Outer hexagon -->
  <polygon points="50,5 90,27.5 90,72.5 50,95 10,72.5 10,27.5" 
           fill="none" stroke="url(#grad)" stroke-width="4"/>
  <!-- Inner connections to center -->
  <line x1="50" y1="5" x2="50" y2="50" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
  <line x1="90" y1="27.5" x2="50" y2="50" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
  <line x1="90" y1="72.5" x2="50" y2="50" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="95" x2="50" y2="50" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
  <line x1="10" y1="72.5" x2="50" y2="50" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
  <line x1="10" y1="27.5" x2="50" y2="50" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
  <!-- Center nexus -->
  <circle cx="50" cy="50" r="10" fill="url(#grad)"/>
  <!-- Corner nodes -->
  <circle cx="50" cy="5" r="4" fill="#6366f1"/>
  <circle cx="90" cy="27.5" r="4" fill="#7c3aed"/>
  <circle cx="90" cy="72.5" r="4" fill="#8b5cf6"/>
  <circle cx="50" cy="95" r="4" fill="#8b5cf6"/>
  <circle cx="10" cy="72.5" r="4" fill="#7c3aed"/>
  <circle cx="10" cy="27.5" r="4" fill="#6366f1"/>
</svg>
