<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Body - main triangles -->
  <polygon points="50,20 75,55 50,70" fill="#6366f1"/>
  <polygon points="50,20 25,55 50,70" fill="#7c3aed"/>
  <!-- Head -->
  <polygon points="50,20 60,10 70,25 50,35" fill="#8b5cf6"/>
  <polygon points="50,20 40,10 30,25 50,35" fill="#6366f1"/>
  <!-- Beak -->
  <polygon points="60,10 75,15 65,20" fill="#4f46e5"/>
  <!-- Wing right -->
  <polygon points="75,55 95,45 85,65" fill="#7c3aed"/>
  <polygon points="75,55 85,65 70,70" fill="#8b5cf6"/>
  <!-- Wing left -->
  <polygon points="25,55 5,45 15,65" fill="#6366f1"/>
  <polygon points="25,55 15,65 30,70" fill="#7c3aed"/>
  <!-- Tail -->
  <polygon points="50,70 40,90 50,80 60,90" fill="#8b5cf6"/>
  <!-- Eye -->
  <circle cx="55" cy="22" r="3" fill="#ffffff"/>
  <circle cx="56" cy="22" r="1.5" fill="#1e1b4b"/>
</svg>
