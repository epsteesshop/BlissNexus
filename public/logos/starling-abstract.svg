<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Ultra minimal bird - sharp angles -->
  <!-- Main body diamond -->
  <polygon points="50,15 80,50 50,75 20,50" fill="url(#bodyGrad)"/>
  <!-- Head triangle -->
  <polygon points="50,15 65,5 80,20" fill="#6366f1"/>
  <!-- Beak -->
  <polygon points="65,5 85,10 75,18" fill="#4f46e5"/>
  <!-- Right wing -->
  <polygon points="80,50 95,35 90,60" fill="#7c3aed"/>
  <!-- Left wing -->  
  <polygon points="20,50 5,35 10,60" fill="#8b5cf6"/>
  <!-- Tail feathers -->
  <polygon points="50,75 35,95 50,85" fill="#6366f1"/>
  <polygon points="50,75 65,95 50,85" fill="#8b5cf6"/>
  <!-- Eye highlight -->
  <circle cx="58" cy="20" r="2" fill="#ffffff" opacity="0.9"/>
</svg>
