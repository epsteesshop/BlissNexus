<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Three curved paths converging to center -->
  <path d="M20 20 Q50 35 50 50" fill="none" stroke="#6366f1" stroke-width="6" stroke-linecap="round"/>
  <path d="M80 20 Q50 35 50 50" fill="none" stroke="#7c3aed" stroke-width="6" stroke-linecap="round"/>
  <path d="M50 90 Q50 65 50 50" fill="none" stroke="#8b5cf6" stroke-width="6" stroke-linecap="round"/>
  <!-- Central point -->
  <circle cx="50" cy="50" r="8" fill="url(#grad1)"/>
  <!-- Endpoint dots -->
  <circle cx="20" cy="20" r="5" fill="#6366f1"/>
  <circle cx="80" cy="20" r="5" fill="#7c3aed"/>
  <circle cx="50" cy="90" r="5" fill="#8b5cf6"/>
</svg>
