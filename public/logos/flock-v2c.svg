<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- V-formation flock - classic migration pattern -->
  
  <!-- Lead bird at point of V -->
  <g transform="translate(38,15)">
    <polygon points="15,0 30,12 15,18 0,12" fill="#6366f1"/>
    <polygon points="30,12 40,8 35,15" fill="#4f46e5"/>
    <polygon points="0,12 -10,8 -5,15" fill="#8b5cf6"/>
  </g>
  
  <!-- Left wing of V -->
  <g transform="translate(22,32)">
    <polygon points="12,0 24,10 12,14 0,10" fill="#7c3aed"/>
    <polygon points="24,10 32,7 28,12" fill="#6366f1"/>
    <polygon points="0,10 -8,7 -4,12" fill="#8b5cf6"/>
  </g>
  <g transform="translate(8,50)">
    <polygon points="10,0 20,8 10,12 0,8" fill="#8b5cf6"/>
    <polygon points="20,8 26,5 23,10" fill="#7c3aed"/>
    <polygon points="0,8 -6,5 -3,10" fill="#6366f1"/>
  </g>
  <g transform="translate(-2,68)" opacity="0.85">
    <polygon points="8,0 16,6 8,9 0,6" fill="#a78bfa"/>
    <polygon points="16,6 20,4 18,7" fill="#8b5cf6"/>
  </g>
  
  <!-- Right wing of V -->
  <g transform="translate(58,32)">
    <polygon points="12,0 24,10 12,14 0,10" fill="#8b5cf6"/>
    <polygon points="24,10 32,7 28,12" fill="#7c3aed"/>
    <polygon points="0,10 -8,7 -4,12" fill="#6366f1"/>
  </g>
  <g transform="translate(72,50)">
    <polygon points="10,0 20,8 10,12 0,8" fill="#7c3aed"/>
    <polygon points="20,8 26,5 23,10" fill="#8b5cf6"/>
    <polygon points="0,8 -6,5 -3,10" fill="#6366f1"/>
  </g>
  <g transform="translate(82,68)" opacity="0.85">
    <polygon points="8,0 16,6 8,9 0,6" fill="#a78bfa"/>
    <polygon points="16,6 20,4 18,7" fill="#8b5cf6"/>
  </g>
  
  <!-- Extra trailing birds for depth -->
  <g transform="translate(-8,82)" opacity="0.6">
    <polygon points="6,0 12,5 6,7 0,5" fill="#c4b5fd"/>
  </g>
  <g transform="translate(88,82)" opacity="0.6">
    <polygon points="6,0 12,5 6,7 0,5" fill="#c4b5fd"/>
  </g>
</svg>
